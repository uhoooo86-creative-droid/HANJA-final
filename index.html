<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>한자 게임</title>
<style>
body{margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#fff0b8,#eaf5ff);font-family:Arial,'Noto Sans KR',sans-serif;color:#12336b;padding:16px}.app{width:min(1050px,100%);background:white;border:4px solid #123b85;border-radius:26px;padding:22px;box-shadow:0 16px 38px #0002}h1{text-align:center;margin:0 0 12px;font-size:clamp(30px,5vw,54px)}.bar,.score{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}.mode,.pill,.ctrl{font-weight:900;border-radius:16px;padding:12px 16px;border:3px solid #123b85;font-size:17px}.mode{background:#e8f1ff;color:#123b85}.mode.on,.pill,.ctrl{background:#123b85;color:white}.ctrl.green{background:#238443;border-color:#238443}.ctrl.gray{background:#777;border-color:#777}.quiz{text-align:center;background:#fff3aa;border:3px dashed #f0a400;border-radius:22px;padding:18px;margin-bottom:16px}.label{font-size:20px;font-weight:900}.q{font-size:clamp(42px,8vw,86px);font-weight:900;color:#df4d28;margin:8px 0}.big{font-size:clamp(90px,18vw,170px);color:#111;line-height:1}.mean{font-size:clamp(21px,3.4vw,34px);font-weight:900;line-height:1.35;max-width:900px;margin:8px auto}.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.choice{aspect-ratio:1.25/1;border:4px solid #123b85;border-radius:22px;background:white;font-size:clamp(52px,10vw,105px);font-weight:900;box-shadow:0 7px 0 #bfd0ee}.choice.read{font-size:clamp(24px,5vw,44px);color:#12336b}.choice.word{font-size:clamp(44px,8vw,86px);letter-spacing:4px}.correct{background:#caffd1!important;border-color:#21a642!important}.wrong{background:#ffd4d4!important;border-color:#e23b3b!important}.write{display:none;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:16px}input{width:min(480px,90%);padding:17px;border:4px solid #123b85;border-radius:16px;font-size:32px;text-align:center;font-weight:900}.msg{text-align:center;min-height:38px;font-size:25px;font-weight:900;margin-top:14px}.small{text-align:center;color:#607088;font-weight:800;margin-top:8px}@media(max-width:700px){.choices{grid-template-columns:repeat(2,1fr)}.app{padding:14px}}
</style></head><body><div class="app"><h1>⭐ 한자 훈음 게임</h1>
<div class="bar"><button id="m1" class="mode on" onclick="setMode('listen')">① 훈음 듣고 한자</button><button id="m2" class="mode" onclick="setMode('read')">② 한자 보고 훈음</button><button id="m3" class="mode" onclick="setMode('write')">③ 한자 보고 쓰기</button><button id="m4" class="mode" onclick="setMode('hard')">④ 설명 보고 한자</button></div>
<div class="score"><div class="pill">점수 <span id="score">0</span></div><div class="pill">문제 <span id="num">1</span> / <span id="total">40</span></div></div>
<section class="quiz"><div id="label" class="label"></div><div id="q" class="q"></div><div id="mean" class="mean" style="display:none"></div><button id="sound" class="ctrl green" onclick="speakNow()">🔊 듣기</button> <button class="ctrl" onclick="next()">➡️ 다음</button> <button class="ctrl gray" onclick="restart()">처음부터</button></section>
<div id="choices" class="choices"></div><div id="write" class="write"><input id="inp" placeholder="예: 노래 가" onkeydown="if(event.key==='Enter')checkWrite()"><button class="ctrl green" onclick="checkWrite()">정답 확인</button></div><div id="msg" class="msg"></div><div class="small">④ 설명 보고 한자 찾기는 훈음 없는 최고 난이도!</div></div>
<script>
const DATA=[["歌", "노래 가"], ["家", "집 가"], ["間", "사이 간"], ["車", "수레 거"], ["巾", "수건 건"], ["古", "예 고"], ["空", "빌 공"], ["教", "가르칠 교"], ["校", "학교 교"], ["國", "나라 국"], ["軍", "군사 군"], ["今", "이제 금"], ["記", "기록할 기"], ["氣", "기운 기"], ["己", "몸 기"], ["農", "농사 농"], ["答", "대답 답"], ["代", "대신할 대"], ["大", "큰 대"], ["道", "길 도"], ["洞", "골 동"], ["登", "오를 등"], ["來", "올 래"], ["老", "늙을 로"], ["里", "마을 리"], ["林", "수풀 림"], ["馬", "말 마"], ["萬", "일만 만"], ["末", "끝 말"], ["每", "매양 매"], ["面", "낯 면"], ["問", "물을 문"], ["物", "물건 물"], ["民", "백성 민"], ["本", "근본 본"], ["不", "아니 불"], ["分", "나눌 분"], ["士", "선비 사"], ["事", "일 사"], ["色", "빛 색"]], WORDS=[{"word": "조퇴", "hanja": "早退", "meaning": "정해진 시간보다 일찍 학교나 직장에서 나가는 것"}, {"word": "예방", "hanja": "豫防", "meaning": "나쁜 일이나 병이 생기기 전에 미리 막는 것"}, {"word": "기억", "hanja": "記憶", "meaning": "보고 듣고 배운 것을 머릿속에 간직하고 떠올리는 것"}, {"word": "요점", "hanja": "要點", "meaning": "말이나 글에서 가장 중요하고 핵심이 되는 부분"}, {"word": "습관", "hanja": "習慣", "meaning": "오랫동안 반복해서 몸에 익은 행동"}, {"word": "발표", "hanja": "發表", "meaning": "생각이나 결과를 여러 사람 앞에서 말하거나 알리는 것"}, {"word": "포유류", "hanja": "哺乳類", "meaning": "새끼를 낳고 젖을 먹여 기르는 동물의 무리"}, {"word": "수면", "hanja": "水面", "meaning": "강, 바다, 호수 등에서 물의 겉면"}];let mode='listen',pool=[],cur=null,score=0,num=1,lock=false;
const $=id=>document.getElementById(id), sh=a=>[...a].sort(()=>Math.random()-0.5), norm=s=>(s||'').replace(/\s+/g,'').trim();
function speak(t){if(!speechSynthesis)return;speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='ko-KR';u.rate=.78;speechSynthesis.speak(u)}
function speakNow(){if(cur)speak(mode==='hard'?cur.meaning:cur[1])}
function setMode(m){mode=m;['m1','m2','m3','m4'].forEach(x=>$(x).classList.remove('on'));$(m==='listen'?'m1':m==='read'?'m2':m==='write'?'m3':'m4').classList.add('on');restart()}
function add(text,cls,item){let b=document.createElement('button');b.className='choice '+cls;b.textContent=text;b.onclick=()=>pick(b,item);$('choices').appendChild(b)}
function addWord(item){let b=document.createElement('button');b.className='choice word';b.textContent=item.hanja;b.onclick=()=>pickWord(b,item);$('choices').appendChild(b)}
function render(){lock=false;$('num').textContent=num;$('total').textContent=mode==='hard'?WORDS.length:DATA.length;$('msg').textContent='';$('choices').innerHTML='';$('write').style.display='none';$('mean').style.display='none';$('sound').style.display=(mode==='listen'||mode==='hard')?'inline-block':'none';$('q').className='q';
 if(mode==='listen'){$('label').textContent='이 훈음에 맞는 한자를 클릭!';$('q').textContent=cur[1];sh([cur,...sh(DATA.filter(x=>x[0]!==cur[0])).slice(0,5)]).forEach(x=>add(x[0],'',x));setTimeout(speakNow,300)}
 else if(mode==='read'){$('label').textContent='이 한자의 훈음을 클릭!';$('q').className='q big';$('q').textContent=cur[0];sh([cur,...sh(DATA.filter(x=>x[0]!==cur[0])).slice(0,5)]).forEach(x=>add(x[1],'read',x))}
 else if(mode==='write'){$('label').textContent='이 한자의 훈음을 직접 쓰세요!';$('q').className='q big';$('q').textContent=cur[0];$('write').style.display='flex';$('inp').value='';setTimeout(()=>$('inp').focus(),100)}
 else {$('label').textContent='단어 설명을 보고 알맞은 한자를 고르세요';$('q').textContent=cur.word;$('mean').style.display='block';$('mean').textContent=cur.meaning;sh([cur,...sh(WORDS.filter(x=>x.hanja!==cur.hanja)).slice(0,5)]).forEach(addWord)}
}
function ok(t){lock=true;score+=10;$('score').textContent=score;$('msg').textContent=t;setTimeout(next,950)}
function pick(b,item){if(lock)return;if(item[0]===cur[0]){b.classList.add('correct');ok('정답! '+cur[0]+' = '+cur[1])}else{b.classList.add('wrong');$('msg').textContent='다시 찾아보세요!'}}
function pickWord(b,item){if(lock)return;if(item.hanja===cur.hanja){b.classList.add('correct');ok('정답! '+cur.word+' = '+cur.hanja)}else{b.classList.add('wrong');$('msg').textContent='다시 찾아보세요!'}}
function checkWrite(){if(lock)return;norm($('inp').value)===norm(cur[1])?ok('정답! '+cur[0]+' = '+cur[1]):$('msg').textContent='아쉬워요! 정답은 "'+cur[1]+'"'}
function next(){if(pool.length===0){cur=null;$('q').className='q';$('q').textContent='게임 완료!';$('mean').style.display='none';$('choices').innerHTML='';$('write').style.display='none';$('msg').textContent='🎉 최종 점수: '+score+'점';return}cur=pool.shift();render();num++}
function restart(){pool=sh(mode==='hard'?WORDS:DATA);score=0;num=1;$('score').textContent=score;next()}restart();
</script></body></html>
